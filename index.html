<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Divine Right Map</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#222222">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }

    /* ── Top HUD bar ── */
    #hud {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.95);
      border-bottom: 1px solid #bbb;
      flex-shrink: 0;
      z-index: 20;
    }

    #turnInfo {
      font-weight: bold;
      flex: 1 1 auto;
      min-width: 120px;
    }

    #vpInfo {
      color: #444;
      white-space: pre;
      flex: 0 1 auto;
    }

    #hud button {
      padding: 4px 10px;
      font-size: 13px;
      cursor: pointer;
      border-radius: 4px;
      border: 1px solid #888;
      background: #f4f4f4;
    }

    #hud button:active { background: #ddd; }

    /* ── Map fills remaining height ── */
    #map-container {
      flex: 1 1 auto;
      overflow: hidden;
      touch-action: none;          /* hand all touch to our JS */
      -webkit-user-select: none;
      user-select: none;
      cursor: grab;
      background: #e8dcc8;         /* parchment background visible outside map */
    }

    #map-container.panning { cursor: grabbing; }

    #map {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Floating info panel ── */
    #info {
      position: fixed;
      bottom: 10px;
      left: 10px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid #aaa;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      max-width: min(260px, 45vw);
      white-space: pre-line;
      z-index: 20;
      pointer-events: none;
    }

    /* ── Combat panel ── */
    #combat-panel {
      position: fixed;
      top: 60px;
      right: 10px;
      background: white;
      padding: 12px;
      border: 1px solid black;
      border-radius: 6px;
      z-index: 30;
      min-width: 200px;
      max-width: 280px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    #combat-panel button {
      margin: 4px 4px 0 0;
      padding: 4px 10px;
      cursor: pointer;
    }

    /* ── SVG element styles ── */
    .hex {
      stroke: black;
      stroke-width: 1.5;
      cursor: pointer;
    }

    .unit {
      stroke: black;
      stroke-width: 1;
      cursor: pointer;
    }

    .unit.faded { opacity: 0.4; }

    .terrain-icon, .fortress-icon, .fortress-name, .fortress-number, .unit-label {
      pointer-events: none;
      text-anchor: middle;
    }

    .fortress-name  { font-size: 6px;  fill: white; }
    .fortress-number { font-size: 8px; fill: white; font-weight: bold; }
    .unit-label      { font-size: 8px; fill: white; }
    .tile-name       { pointer-events: none; }

    .lake, .river { pointer-events: none; }

    .valid-move  { stroke: yellow; stroke-width: 3; }
    .valid-combat { stroke: red;   stroke-width: 3; }
    .attack-target {
      outline: 3px solid red;
      outline-offset: -3px;
      cursor: pointer;
    }
    .current-combat { stroke: blue; stroke-width: 3; }

    @keyframes pulse-red {
      0%   { stroke-opacity: 1; }
      50%  { stroke-opacity: 0.3; }
      100% { stroke-opacity: 1; }
    }
    .besieged-outline {
      animation: pulse-red 1.5s infinite;
    }

    .selectable-mutiny {
      stroke: red;
      stroke-width: 3px;
      cursor: pointer;
    }

    /* ── Responsive tweaks for small screens ── */
    @media (max-width: 480px) {
      #hud { font-size: 12px; }
      #turnInfo { min-width: 0; }
      #info { max-width: 90vw; bottom: 4px; left: 4px; }
    }

    /* ── Setup screen ── */
    #setup-screen {
      position: fixed; inset: 0; background: rgba(0,0,0,0.82);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    #setup-box {
      background: #fff; border-radius: 10px; padding: 28px 32px;
      max-width: 480px; width: 90vw; box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    #setup-box h2 { margin: 0 0 16px; font-size: 22px; }
    #setup-box label { display: block; margin-bottom: 12px; font-size: 14px; }
    #setup-box select { margin-left: 8px; padding: 3px 6px; font-size: 14px; }
    .setup-slot {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 0; border-bottom: 1px solid #eee;
    }
    .setup-label { min-width: 60px; font-weight: bold; }
    .setup-slot select { flex: 1; padding: 4px; font-size: 13px; }
    #setup-start-btn {
      margin-top: 20px; padding: 8px 24px; font-size: 15px;
      background: #2a6; color: #fff; border: none; border-radius: 6px; cursor: pointer;
    }
    #setup-start-btn:hover { background: #1a5; }

    /* ── Multiplayer lobby ── */
    #mp-lobby {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center; z-index: 110;
    }
    #mp-lobby-box {
      background: #fff; border-radius: 10px; padding: 28px 32px;
      max-width: 440px; width: 90vw; box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    #mp-lobby-box h2 { margin: 0 0 16px; font-size: 20px; }
    #mp-lobby-box input { padding: 6px 10px; font-size: 14px; border: 1px solid #ccc;
      border-radius: 4px; width: 100%; box-sizing: border-box; margin: 4px 0 10px; }
    #mp-lobby-box button { padding: 8px 18px; font-size: 14px; border-radius: 5px;
      border: none; cursor: pointer; margin: 4px 4px 0 0; }
    #mp-create-btn  { background: #2a6; color: #fff; }
    #mp-join-btn    { background: #46a; color: #fff; }
    #mp-offline-btn { background: #888; color: #fff; }

    /* ── Faction picker ── */
    #mp-faction-picker {
      position: fixed; inset: 0; background: rgba(0,0,0,0.88);
      display: none; align-items: center; justify-content: center; z-index: 115;
    }
    #mp-fp-box {
      background: #fff; border-radius: 10px; padding: 24px 28px;
      max-width: 600px; width: 95vw; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    #mp-fp-box h2 { margin: 0 0 4px; font-size: 20px; }
    #mp-fp-room-code { font-size: 22px; font-weight: bold; letter-spacing: 4px;
      text-align: center; padding: 8px; background: #f4f4f4; border-radius: 6px; margin: 8px 0 12px; }
    #mp-fp-players { border-bottom: 1px solid #eee; margin-bottom: 12px; padding-bottom: 8px; }
    .fp-player { font-size: 13px; padding: 3px 0; color: #555; }
    .fp-player-ready { color: #2a6; font-weight: bold; }
    #mp-fp-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px;
      margin-bottom: 14px;
    }
    .fp-card {
      border: 2px solid #ccc; border-radius: 8px; padding: 10px 8px;
      text-align: center; cursor: pointer; transition: border-color .15s, background .15s;
      background: #f9f9f9;
    }
    .fp-card:hover { border-color: #888; background: #f0f0f0; }
    .fp-random-card    { border-style: dashed; border-color: #888; }
    .fp-card.fp-mine   { border-color: #2a6; background: #e8f5ee; border-style: solid; }
    .fp-card.fp-taken  { border-color: #ccc; background: #f0f0f0; opacity: 0.55; cursor: default; }
    .fp-card.fp-pending { border-color: #e80; background: #fff8e8; }
    .fp-card-name   { font-weight: bold; font-size: 13px; margin-bottom: 4px; }
    .fp-card-status { font-size: 11px; color: #666; min-height: 14px; }
    .fp-card.fp-mine .fp-card-status   { color: #2a6; }
    .fp-card.fp-pending .fp-card-status { color: #e80; }
    #mp-fp-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    #mp-fp-ready-btn  { padding: 8px 20px; font-size: 14px; border-radius: 5px; border: none;
      cursor: pointer; background: #e80; color: #fff; }
    #mp-fp-ready-btn:disabled { background: #aaa; cursor: default; }
    #mp-fp-start-btn  { padding: 8px 20px; font-size: 14px; border-radius: 5px; border: none;
      cursor: pointer; background: #2a6; color: #fff; }
    #mp-fp-start-btn:disabled { background: #aaa; cursor: default; }

    /* ── Eaters spell panel ── */
    #spell-panel {
      position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
      background: #fff; border: 2px solid #888; border-radius: 8px;
      padding: 14px 18px; z-index: 40; min-width: 300px; max-width: 380px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    #spell-panel button {
      display: block; width: 100%; margin: 5px 0;
      padding: 6px 10px; font-size: 13px; text-align: left;
      cursor: pointer; border: 1px solid #aaa; border-radius: 4px;
      background: #f8f8f8;
    }
    #spell-panel button:hover { background: #e8e8e8; }
  </style>
</head>

  <script>
  // ── Multiplayer wiring ──────────────────────────────────────────────────────
  (function() {
    MP.init();

    const lobbyEl = document.getElementById("mp-lobby");
    const fpEl    = document.getElementById("mp-faction-picker");
    const setupEl = document.getElementById("setup-screen");

    let _playableFactions = [];
    let _displayNames     = {};
    let _pendingFaction   = null; // optimistic before transaction resolves
    let _markedReady      = false; // true once Ready button clicked (prevents re-enable)

    // ── Load playable factions from scenario.json ──────────────────────────
    async function loadFactions() {
      const r    = await fetch("scenarios/board-game/scenario.json");
      const data = await r.json();
      _playableFactions = Object.entries(data.factions)
        .filter(([, f]) => f.playable)
        .map(([id]) => id);
      _displayNames = Object.fromEntries(
        Object.entries(data.factions).map(([id, f]) => [id, f.display || id])
      );
    }

    // ── Show faction picker ────────────────────────────────────────────────
    function showFactionPicker() {
      lobbyEl.style.display = "none";
      setupEl.style.display = "none";
      fpEl.style.display    = "flex";

      document.getElementById("mp-fp-room-code").textContent = "Room: " + MP.gameId();

      // Build faction card grid
      const grid = document.getElementById("mp-fp-grid");
      grid.innerHTML = "";

      // Random card first
      const randCard = document.createElement("div");
      randCard.className = "fp-card fp-random-card";
      randCard.dataset.faction = "random";
      randCard.innerHTML = `<div class="fp-card-name">Random</div><div class="fp-card-status">Assigned at start</div>`;
      randCard.addEventListener("click", () => handleFactionClick("random"));
      grid.appendChild(randCard);

      for (const fId of _playableFactions) {
        const card = document.createElement("div");
        card.className = "fp-card";
        card.dataset.faction = fId;
        card.innerHTML = `<div class="fp-card-name">${_displayNames[fId] || fId}</div><div class="fp-card-status"></div>`;
        card.addEventListener("click", () => handleFactionClick(fId));
        grid.appendChild(card);
      }

      // Host sees Start button; others don't
      const startBtn = document.getElementById("mp-fp-start-btn");
      if (MP.isHost()) startBtn.style.display = "inline-block";
      else startBtn.style.display = "none";
    }

    // ── Handle clicking a faction card ─────────────────────────────────────
    async function handleFactionClick(fId) {
      if (fId === MP.myFaction()) return; // already mine

      if (fId === "random") {
        // Release any specific claim; mark as random
        _pendingFaction = "random";
        refreshGrid(MP.getRoomData());
        await MP.claimFaction(null); // release claim
        await MP.setFactionRandom();
        _pendingFaction = null;
        return;
      }

      // Optimistic update
      _pendingFaction = fId;
      refreshGrid(MP.getRoomData());

      const ok = await MP.claimFaction(fId);
      _pendingFaction = null;

      if (!ok) {
        // Faction taken — stay on random
        await MP.setFactionRandom();
      }
      // Firestore listener refreshes with authoritative state
    }

    // ── Refresh faction grid from Firestore data ───────────────────────────
    function refreshGrid(data) {
      if (!data) return;
      const claims    = data.factionClaims || {};
      const players   = data.players || {};

      // factionId → claimant display name
      const claimNames = {};
      for (const [fId, pId] of Object.entries(claims)) {
        claimNames[fId] = players[pId]?.name || "?";
      }

      const myFaction = _pendingFaction || MP.myFaction();

      for (const card of document.querySelectorAll(".fp-card")) {
        const fId      = card.dataset.faction;
        const statusEl = card.querySelector(".fp-card-status");
        // preserve base classes (fp-random-card)
        const isRandom = fId === "random";
        card.className = "fp-card" + (isRandom ? " fp-random-card" : "");

        if (fId === _pendingFaction) {
          card.classList.add("fp-pending");
          statusEl.textContent = "Confirming…";
        } else if (fId === myFaction && !_pendingFaction) {
          card.classList.add("fp-mine");
          statusEl.textContent = isRandom ? "✓ Random" : "✓ Your pick";
        } else if (!isRandom && claimNames[fId]) {
          card.classList.add("fp-taken");
          statusEl.textContent = claimNames[fId];
        } else if (isRandom) {
          statusEl.textContent = "Assigned at start";
        } else {
          statusEl.textContent = "";
        }
      }

      refreshPlayerList(data);
      refreshStartBtn(data);

      // Enable ready button when a choice is made (specific faction or random)
      // but never re-enable after the player has clicked Ready
      if (!_markedReady) {
        const readyBtn = document.getElementById("mp-fp-ready-btn");
        if (readyBtn) readyBtn.disabled = !myFaction;
      }
    }

    function refreshPlayerList(data) {
      const el = document.getElementById("mp-fp-players");
      if (!el) return;
      const players = data.players || {};
      const myId    = MP.playerId();
      el.innerHTML  = Object.entries(players).map(([pId, p]) => {
        const you     = pId === myId ? " (you)" : "";
        const faction = !p.faction ? "choosing…"
                      : p.faction === "random" ? "Random"
                      : (_displayNames[p.faction] || p.faction);
        const ready   = p.ready ? " ✓" : "";
        return `<div class="fp-player${p.ready ? " fp-player-ready" : ""}">${p.name}${you}: ${faction}${ready}</div>`;
      }).join("");
    }

    function refreshStartBtn(data) {
      const btn = document.getElementById("mp-fp-start-btn");
      if (!btn || !MP.isHost()) return;
      const players = Object.values(data.players || {});
      // faction can be a specific ID or "random" — both count as chosen
      const allReady = players.length > 0 && players.every(p => p.ready && p.faction);
      btn.disabled    = !allReady;
      btn.textContent = allReady ? "Start Game" : "Waiting for players…";
    }

    // ── Firestore updates → refresh UI ─────────────────────────────────────
    MP.onFactionUpdate((data) => {
      if (fpEl.style.display !== "none") refreshGrid(data);
    });

    // ── Game started (non-host receives this) ──────────────────────────────
    MP.onGameStart(() => {
      fpEl.style.display = "none";
      drawMap();
      updateTurnInfo();
      updateVPInfo();
    });

    // ── Lobby buttons ──────────────────────────────────────────────────────
    document.getElementById("mp-offline-btn").addEventListener("click", () => {
      lobbyEl.style.display = "none";
      // setup-screen is already visible
    });

    document.getElementById("mp-join-btn").addEventListener("click", () => {
      const row = document.getElementById("mp-join-row");
      row.style.display = row.style.display === "none" ? "block" : "none";
    });

    document.getElementById("mp-create-btn").addEventListener("click", async () => {
      const name = (document.getElementById("mp-name-input").value || "").trim();
      if (!name) { alert("Enter your name first."); return; }
      if (!MP.online()) { alert("No Firebase connection — playing offline."); lobbyEl.style.display = "none"; return; }
      try {
        await loadFactions();
        const code = await MP.createGame(name);
        if (!code) { lobbyEl.style.display = "none"; return; }
        showFactionPicker();
      } catch (e) {
        console.error("[MP] createGame error", e);
        alert("Could not create room. Playing offline.");
        lobbyEl.style.display = "none";
      }
    });

    document.getElementById("mp-join-confirm-btn").addEventListener("click", async () => {
      const name = (document.getElementById("mp-name-input").value || "").trim();
      const code = (document.getElementById("mp-code-input").value || "").trim().toUpperCase();
      if (!name) { alert("Enter your name."); return; }
      if (!code) { alert("Enter a room code."); return; }
      try {
        await loadFactions();
        const ok = await MP.joinGame(code, name);
        if (!ok) return;
        showFactionPicker();
      } catch (e) {
        console.error("[MP] joinGame error", e);
        alert("Could not join room.");
      }
    });

    // ── Faction picker buttons ─────────────────────────────────────────────
    document.getElementById("mp-fp-ready-btn").addEventListener("click", async function() {
      _markedReady     = true;
      this.disabled    = true;
      this.textContent = "✓ Ready";
      await MP.setReady(true);
    });

    document.getElementById("mp-fp-start-btn").addEventListener("click", async () => {
      const data = MP.getRoomData();
      if (!data) return;

      const claims  = data.factionClaims || {};
      const players = data.players || {};

      // Resolve "random" players — assign them unclaimed factions
      const claimed   = new Set(Object.keys(claims));
      const unclaimed = [..._playableFactions].filter(f => !claimed.has(f));
      shuffle(unclaimed);

      const finalPlayers = [];
      for (const [, p] of Object.entries(players)) {
        if (!p.faction) continue;
        if (p.faction === "random") {
          const assigned = unclaimed.shift();
          if (assigned) finalPlayers.push({ faction: assigned, control: "human" });
        } else {
          finalPlayers.push({ faction: p.faction, control: "human" });
        }
      }

      // Build controlTypes
      const humanFactions = new Set(finalPlayers.map(p => p.faction));
      for (const f of _playableFactions) {
        controlTypes[f] = humanFactions.has(f) ? "human" : "neutral";
        if (!humanFactions.has(f)) neutralFactions.add(f);
      }

      fpEl.style.display = "none";

      try {
        console.log("[MP] Loading scenario…");
        await loadScenario("board-game");
        console.log("[MP] Scenario loaded — starting game");
        initGame({ players: finalPlayers });
        console.log("[MP] initGame done — pushing to Firestore");
        await MP.startGame();
        console.log("[MP] startGame done");
      } catch (e) {
        console.error("[MP] Start failed:", e);
        alert("Failed to start: " + (e.message || e));
        fpEl.style.display = "flex"; // re-show picker on error
      }
    });

    // ── Wrap endTurn to push state ─────────────────────────────────────────
    const _origEndTurn = window.endTurn;
    window.endTurn = function() {
      _origEndTurn();
      if (MP.online() && MP.gameId()) {
        MP.pushState();
        if (typeof saveGameToLocalStorage === "function") saveGameToLocalStorage();
      }
    };

    // ── Block map interaction when not your turn ───────────────────────────
    MP.onRemoteState(() => {
      const mine = MP.isMyTurn();
      document.getElementById("map-container").style.pointerEvents = mine ? "auto" : "none";
      const banner = document.getElementById("mp-turn-banner");
      if (banner) banner.textContent = mine ? "" : `Waiting for ${turnOrder[currentTurnIndex]}…`;
    });
  })();
  </script>

</body>
