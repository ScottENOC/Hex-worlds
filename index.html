<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Divine Right Map</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#222222">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }

    /* ── Top HUD bar ── */
    #hud {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.95);
      border-bottom: 1px solid #bbb;
      flex-shrink: 0;
      z-index: 20;
    }

    #turnInfo {
      font-weight: bold;
      flex: 1 1 auto;
      min-width: 120px;
    }

    #vpInfo {
      color: #444;
      white-space: pre;
      flex: 0 1 auto;
    }

    #hud button {
      padding: 4px 10px;
      font-size: 13px;
      cursor: pointer;
      border-radius: 4px;
      border: 1px solid #888;
      background: #f4f4f4;
    }

    #hud button:active { background: #ddd; }

    /* ── Map fills remaining height ── */
    #map-container {
      flex: 1 1 auto;
      overflow: hidden;
      touch-action: none;          /* hand all touch to our JS */
      -webkit-user-select: none;
      user-select: none;
      cursor: grab;
      background: #e8dcc8;         /* parchment background visible outside map */
    }

    #map-container.panning { cursor: grabbing; }

    #map {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Floating info panel ── */
    #info {
      position: fixed;
      bottom: 10px;
      left: 10px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid #aaa;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      max-width: min(260px, 45vw);
      white-space: pre-line;
      z-index: 20;
      pointer-events: none;
    }

    /* ── Combat panel ── */
    #combat-panel {
      position: fixed;
      top: 60px;
      right: 10px;
      background: white;
      padding: 12px;
      border: 1px solid black;
      border-radius: 6px;
      z-index: 30;
      min-width: 200px;
      max-width: 280px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    #combat-panel button {
      margin: 4px 4px 0 0;
      padding: 4px 10px;
      cursor: pointer;
    }

    /* ── SVG element styles ── */
    .hex {
      stroke: black;
      stroke-width: 1.5;
      cursor: pointer;
    }

    .unit {
      stroke: black;
      stroke-width: 1;
      cursor: pointer;
    }

    .unit.faded { opacity: 0.4; }

    .terrain-icon, .fortress-icon, .fortress-name, .fortress-number, .unit-label {
      pointer-events: none;
      text-anchor: middle;
    }

    .fortress-name  { font-size: 6px;  fill: white; }
    .fortress-number { font-size: 8px; fill: white; font-weight: bold; }
    .unit-label      { font-size: 8px; fill: white; }
    .tile-name       { pointer-events: none; }

    .lake, .river { pointer-events: none; }

    .valid-move  { stroke: yellow; stroke-width: 3; }
    .valid-combat { stroke: red;   stroke-width: 3; }
    .attack-target {
      outline: 3px solid red;
      outline-offset: -3px;
      cursor: pointer;
    }
    .current-combat { stroke: blue; stroke-width: 3; }

    @keyframes pulse-red {
      0%   { stroke-opacity: 1; }
      50%  { stroke-opacity: 0.3; }
      100% { stroke-opacity: 1; }
    }
    .besieged-outline {
      animation: pulse-red 1.5s infinite;
    }

    .selectable-mutiny {
      stroke: red;
      stroke-width: 3px;
      cursor: pointer;
    }

    /* ── Responsive tweaks for small screens ── */
    @media (max-width: 480px) {
      #hud { font-size: 12px; }
      #turnInfo { min-width: 0; }
      #info { max-width: 90vw; bottom: 4px; left: 4px; }
    }

    /* ── Setup screen ── */
    #setup-screen {
      position: fixed; inset: 0; background: rgba(0,0,0,0.82);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    #setup-box {
      background: #fff; border-radius: 10px; padding: 28px 32px;
      max-width: 480px; width: 90vw; box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    #setup-box h2 { margin: 0 0 16px; font-size: 22px; }
    #setup-box label { display: block; margin-bottom: 12px; font-size: 14px; }
    #setup-box select { margin-left: 8px; padding: 3px 6px; font-size: 14px; }
    .setup-slot {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 0; border-bottom: 1px solid #eee;
    }
    .setup-label { min-width: 60px; font-weight: bold; }
    .setup-slot select { flex: 1; padding: 4px; font-size: 13px; }
    #setup-start-btn {
      margin-top: 20px; padding: 8px 24px; font-size: 15px;
      background: #2a6; color: #fff; border: none; border-radius: 6px; cursor: pointer;
    }
    #setup-start-btn:hover { background: #1a5; }

    /* ── Multiplayer lobby ── */
    #mp-lobby {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center; z-index: 110;
    }
    #mp-lobby-box {
      background: #fff; border-radius: 10px; padding: 28px 32px;
      max-width: 440px; width: 90vw; box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    #mp-lobby-box h2 { margin: 0 0 16px; font-size: 20px; }
    #mp-room-code { font-size: 28px; font-weight: bold; letter-spacing: 4px;
      text-align: center; padding: 10px; background: #f4f4f4;
      border-radius: 6px; margin: 12px 0; }
    .mp-player { display: flex; justify-content: space-between; padding: 6px 0;
      border-bottom: 1px solid #eee; font-size: 14px; }
    .mp-player.mp-ready { color: #2a6; }
    #mp-lobby-box input { padding: 6px 10px; font-size: 14px; border: 1px solid #ccc;
      border-radius: 4px; width: 100%; box-sizing: border-box; margin: 4px 0 10px; }
    #mp-lobby-box button { padding: 8px 18px; font-size: 14px; border-radius: 5px;
      border: none; cursor: pointer; margin: 4px 4px 0 0; }
    #mp-create-btn  { background: #2a6; color: #fff; }
    #mp-join-btn    { background: #46a; color: #fff; }
    #mp-ready-btn   { background: #e80; color: #fff; }
    #mp-start-btn   { background: #2a6; color: #fff; }
    #mp-start-btn:disabled { background: #aaa; cursor: default; }
    #mp-offline-btn { background: #888; color: #fff; }

    /* ── Eaters spell panel ── */
    #spell-panel {
      position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
      background: #fff; border: 2px solid #888; border-radius: 8px;
      padding: 14px 18px; z-index: 40; min-width: 300px; max-width: 380px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    #spell-panel button {
      display: block; width: 100%; margin: 5px 0;
      padding: 6px 10px; font-size: 13px; text-align: left;
      cursor: pointer; border: 1px solid #aaa; border-radius: 4px;
      background: #f8f8f8;
    }
    #spell-panel button:hover { background: #e8e8e8; }
  </style>
</head>

  <script>
    // Load Firebase SDK non-blocking; multiplayer.js handles absence gracefully
    function _loadFirebase() {
      const s1 = document.createElement("script");
      s1.src = "https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js";
      s1.onerror = () => console.warn("[MP] Firebase app SDK failed to load — offline mode");
      s1.onload = () => {
        const s2 = document.createElement("script");
        s2.src = "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js";
        s2.onerror = () => console.warn("[MP] Firebase Firestore SDK failed to load — offline mode");
        document.head.appendChild(s2);
      };
      document.head.appendChild(s1);
    }
    _loadFirebase();
  </script>

  <!-- Multiplayer lobby (shown before setup screen) -->
  <div id="mp-lobby">
    <div id="mp-lobby-box">
      <h2>Divine Right — Multiplayer</h2>

      <!-- Mode picker -->
      <div id="mp-mode-picker">
        <p style="color:#555;font-size:13px;margin:0 0 12px">
          Play online with friends (async — take turns when ready) or offline locally.

  <script>
  // ── Multiplayer lobby wiring ────────────────────────────────────────────────
  (function() {
    MP.init();

    const lobbyEl       = document.getElementById("mp-lobby");
    const modeEl        = document.getElementById("mp-mode-picker");
    const waitingEl     = document.getElementById("mp-waiting-room");
    const joinRowEl     = document.getElementById("mp-join-row");
    const factionInput  = document.getElementById("mp-faction-input");
    const codeInput     = document.getElementById("mp-code-input");

    function getFaction() {
      return (factionInput.value || "").trim().toLowerCase();
    }

    // Play offline — skip lobby, go straight to setup screen
    document.getElementById("mp-offline-btn").addEventListener("click", () => {
      lobbyEl.style.display = "none";
    });

    // Show join row
    document.getElementById("mp-join-btn").addEventListener("click", () => {
      joinRowEl.style.display = joinRowEl.style.display === "none" ? "block" : "none";
    });

    // Create room
    document.getElementById("mp-create-btn").addEventListener("click", async () => {
      const faction = getFaction();
      if (!faction) { alert("Enter your faction name first."); return; }
      if (!MP.online()) { alert("No Firebase config set — running offline."); lobbyEl.style.display = "none"; return; }
      const code = await MP.createGame(faction);
      modeEl.style.display = "none";
      waitingEl.style.display = "block";
      document.getElementById("mp-room-code").textContent = code;
    });

    // Confirm join
    document.getElementById("mp-join-confirm-btn").addEventListener("click", async () => {
      const faction = getFaction();
      const code    = codeInput.value.trim().toUpperCase();
      if (!faction) { alert("Enter your faction name first."); return; }
      if (!code)    { alert("Enter a room code."); return; }
      const ok = await MP.joinGame(code, faction);
      if (!ok) return;
      modeEl.style.display = "none";
      waitingEl.style.display = "block";
      document.getElementById("mp-room-code").textContent = code;
      // Hide start button for non-host
      document.getElementById("mp-start-btn").style.display = "none";
    });

    // Ready
    document.getElementById("mp-ready-btn").addEventListener("click", async () => {
      await MP.setReady(true);
      document.getElementById("mp-ready-btn").textContent = "✓ Ready";
      document.getElementById("mp-ready-btn").disabled = true;
    });

    // Start (host only)
    document.getElementById("mp-start-btn").addEventListener("click", async () => {
      // The setup screen will run first (offline) then we push state once initGame fires
      lobbyEl.style.display = "none";
      window._mpStartPending = true;
    });

    // After initGame() runs, if we came from multiplayer, push initial state
    const _origInitGame = window.initGame;
    window.initGame = function(opts) {
      _origInitGame(opts);
      if (window._mpStartPending) {
        window._mpStartPending = false;
        MP.startGame();
      }
    };

    // Auto-push state after every endTurn()
    const _origEndTurn = window.endTurn;
    window.endTurn = function() {
      _origEndTurn();
      if (MP.online() && MP.gameId()) {
        MP.pushState();
        // Also auto-save locally
        saveGameToLocalStorage && saveGameToLocalStorage();
      }
    };

    // Block interaction when it's not your turn
    MP.onRemoteState(() => {
      const mine = MP.isMyTurn();
      document.getElementById("map-container").style.pointerEvents = mine ? "auto" : "none";
      document.querySelector("#hud button")?.setAttribute("disabled", mine ? "" : "true");
      const banner = document.getElementById("mp-turn-banner");
      if (banner) banner.textContent = mine ? "" : `Waiting for ${turnOrder[currentTurnIndex]}…`;
    });
  })();
  </script>
